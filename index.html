<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猪咪之家🐱</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{
            background-color: #fff8f0;
            font-family: 微软雅黑,sans-serif;
            text-align: center;
            padding: 30px;
        }
        h1{
            color: #ff8c69;
            margin: 20px 0;
            font-size: 36px;
        }
        .intro{
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }
        /* 图片相册布局 */
        .photo-box{
            max-width: 1200px;
            margin: 0 auto 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
            gap: 20px;
        }
        .photo-box img{
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 3px 10px #ddd;
            transition: 0.3s;
        }
        .photo-box img:hover{
            transform: scale(1.05);
        }
        /* 视频区域 */
        .video-title{
            color: #ff8c69;
            font-size: 28px;
            margin: 60px 0 20px;
        }
        video{
            width: 80%;
            max-width: 800px;
            border-radius: 15px;
            box-shadow: 0 3px 10px #ddd;
            margin-bottom: 30px;
        }
        footer{
            margin-top: 80px;
            color: #999;
        }
    </style>
</head>
<body>
    <h1>🐾 我家银渐层的专属小世界 🐾</h1>
    <p class="intro">记录猪咪的每一个可爱瞬间～</p>

    <!-- 猫咪图片相册 【这里替换你的图片】 -->
    <div class="photo-box">
        <!-- 把src里的图片名字改成你上传的图片文件名 -->
        <img src="cat1.jpg" alt="猫咪照片1">
        <img src="cat2.jpg" alt="猫咪照片2">
        <img src="cat3.jpg" alt="猫咪照片3">
        <img src="cat4.jpg" alt="猫咪照片4">
        <img src="cat5.jpg" alt="猫咪照片5">
	    <img src="cat6.jpg" alt="猫咪照片6">
    	<img src="cat7.jpg" alt="猫咪照片7">
    	<img src="cat8.jpg" alt="猫咪照片8">
    	<img src="cat9.jpg" alt="猫咪照片9">
    	<img src="cat10.jpg" alt="猫咪照片10">
    	<img src="cat11.jpg" alt="猫咪照片11">
    	<img src="cat12.jpg" alt="猫咪照片12">
    </div>

    <!-- 猫咪视频区域 【这里替换你的视频】 -->
    <h2 class="video-title">🎬 猪咪日常视频</h2>
    <video controls autoplay muted loop>
        <source src="catvideo1.mp4" type="video/mp4">
        你的浏览器不支持播放视频
    </video>

    <footer>❤️ 小猪咪永远健康快乐 猪咪妈妈万事顺意 ❤️</footer>
</body>
</html>
